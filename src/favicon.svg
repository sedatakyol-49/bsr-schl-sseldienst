<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6080;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2a3f5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2a40;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c8d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8090a8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield outer (border/shadow) -->
  <path d="M16 1.5 L28.5 6.5 L28.5 17 Q28.5 25 16 30.5 Q3.5 25 3.5 17 L3.5 6.5 Z"
        fill="url(#shieldBorder)" />

  <!-- Shield inner -->
  <path d="M16 3.5 L27 8 L27 17 Q27 23.5 16 28.5 Q5 23.5 5 17 L5 8 Z"
        fill="url(#shieldGrad)" />

  <!-- Key: circle (bow) -->
  <circle cx="14" cy="13" r="4" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="14" cy="13" r="1.5" fill="url(#shieldGrad)" stroke="white" stroke-width="0.5"/>

  <!-- Key: shaft -->
  <rect x="16.5" y="12.2" width="8" height="1.6" rx="0.8" fill="white"/>

  <!-- Key: teeth -->
  <rect x="21.5" y="13.8" width="1.4" height="2" rx="0.4" fill="white"/>
  <rect x="23.8" y="13.8" width="1.4" height="2.8" rx="0.4" fill="white"/>
</svg>
